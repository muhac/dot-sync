name: Test dot-sync

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check dot-sync
        run: cargo check

      - name: Test dot-sync
        run: cargo test

      - name: Run dot-sync help
        run: cargo run --quiet --bin dot-sync -- --help

      - name: Run ds help
        run: cargo run --quiet --bin ds -- --help
