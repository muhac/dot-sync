[package]
name = "dotctl"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
clap = { version = "4", features = ["derive"] }
dirs = "6"
serde = { version = "1", features = ["derive"] }
serde_yaml = "0.9"
toml_edit = "0.22"

[dev-dependencies]
tempfile = "3"
